server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    charset utf-8;
    # .md / .c 등 mime.types 에 없는 확장자를 다운로드 대신 브라우저에서 텍스트로 표시.
    # .html 은 mime.types 로 text/html 유지(렌더링), .png 등 이미지도 그대로.
    default_type text/plain;
    charset_types text/plain text/html text/css text/xml application/javascript application/json image/svg+xml;

    location / {
        autoindex on;
        try_files $uri $uri/ =404;
    }
}
